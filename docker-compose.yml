# Compose generique : parametre via .env local (ecrit par le bootstrap).
# Modele mono-env (1 VM = 1 environnement), paths toujours identiques :
#   /opt/sideserver-prod/.env -> CONTAINER_NAME=sidestore-website-prod,
#                                HOST_PORT=80, ENV_FILE=/etc/ipastore/prod.env,
#                                STORE_PATH=/srv/store-prod
# Le bootstrap-dev utilise les memes valeurs -- seule la branche Git differe.

services:
  ipastore:
    build: .
    image: ipastore:${IMAGE_TAG:-local}
    container_name: ${CONTAINER_NAME:?CONTAINER_NAME manquant dans .env}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:?HOST_PORT manquant dans .env}:8000"
    env_file:
      - ${ENV_FILE:?ENV_FILE manquant dans .env}
    volumes:
      - ${STORE_PATH:?STORE_PATH manquant dans .env}:/srv/store
      - /etc/ipastore:/etc/ipastore
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/source.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
