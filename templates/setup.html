{% extends "base.html" %}
{% block title %}Initialisation - IPA Store{% endblock %}
{% block anon %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">ip</div>
      <div>
        <div class="brand-name">IPA Store</div>
        <span class="brand-sub">Premier démarrage</span>
      </div>
    </div>
    <h1>Créer le compte admin</h1>
    <p class="sub">Premier démarrage : définis les identifiants d'administration.</p>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post" action="/setup" autocomplete="off">
      <div class="field">
        <label for="username">Identifiant</label>
        <input class="input" id="username" name="username" value="{{ username|default('admin') }}" required autofocus minlength="3">
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input class="input" id="password" name="password" type="password" required minlength="8">
        <span class="hint">8 caractères minimum.</span>
      </div>
      <div class="field">
        <label for="password_confirm">Confirmation</label>
        <input class="input" id="password_confirm" name="password_confirm" type="password" required minlength="8">
      </div>
      <button class="btn btn-primary" type="submit">Initialiser</button>
    </form>
  </div>
</div>
{% endblock %}
