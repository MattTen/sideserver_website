server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Uploads illimites (FastAPI streame sur disque)
    client_max_body_size 0;
    client_body_buffer_size 1m;
    client_body_timeout 3600s;
    send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # === Public: fichiers IPA (SideStore les fetch) ===
    location /ipas/ {
        alias /srv/store/ipas/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin "*" always;
        sendfile on;
        tcp_nopush on;
    }

    # === Public: icones + screenshots ===
    location /icons/ {
        alias /srv/store/icons/;
        autoindex on;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location /screenshots/ {
        alias /srv/store/screenshots/;
        autoindex on;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # === Static assets de l'admin ===
    location /static/ {
        alias /opt/ipastore/static/;
        expires 1h;
    }

    # === Tout le reste vers FastAPI (source.json, admin UI, login) ===
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    access_log /var/log/nginx/store-access.log;
    error_log /var/log/nginx/store-error.log;
}
